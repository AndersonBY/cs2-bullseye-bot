name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Test and build
        run: |
          scripts/fetch-raytrace.sh
          dotnet build BotAimImprover.csproj -c Release --nologo
      - name: Build and validate release archive
        run: scripts/package-release.sh v2.1.4-mbsifu.0
      - uses: actions/upload-artifact@v7
        with:
          name: cs2-bullseye-bot-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
